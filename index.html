<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Global Mood</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #2a5298, #6dd5ed);
      color: white;
    }

    h2 {
      font-weight: 300;
      letter-spacing: 1px;
    }

    .moods {
      display: flex;
      gap: 20px;
      padding: 20px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .moods button {
      font-size: 42px;
      background: none;
      border: none;
      cursor: pointer;
      transition: all .25s ease;
      opacity: 0.6;
    }

    .moods button:hover {
      transform: scale(1.2);
      opacity: 1;
    }

    .moods button.active {
      transform: scale(1.35);
      opacity: 1;
      filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
    }

    #counts {
      margin-top: 30px;
      font-size: 16px;
      opacity: 0.85;
      text-align: center;
    }


    .stats {
      margin-top: 40px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 16px;
      border-radius: 14px;
      backdrop-filter: blur(8px);
      transition: all .3s ease;
    }

    .stat-card.dominant {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .stat-count {
      font-weight: bold;
      font-size: 16px;
    }

    .stat-bar {
      height: 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      background: white;
      width: 0%;
      transition: width .6s ease;
    }
  </style>
</head>

<body>

  <h2>Hoy estamos así...</h2>

  <div class="moods">
    <button onclick="vote('sad')">😞</button>
    <button onclick="vote('neutral')">😐</button>
    <button onclick="vote('hopeful')">🙂</button>
    <button onclick="vote('calm')">😌</button>
    <button onclick="vote('angry')">😠</button>
  </div>

  <div id="counts" class="stats"></div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

    const supabase = createClient(
      "https://rrsvgtcfenycanestfcc.supabase.co",
      "sb_publishable_sVkySTg1ue5mEJgkQvG_zA_6yYr6ruW"
    );

    // 🔐 Token único consistente
    function getUserToken() {
      let token = localStorage.getItem("mood_token");
      if (!token) {
        token = crypto.randomUUID();
        localStorage.setItem("mood_token", token);
      }
      return token;
    }

    const userToken = getUserToken();

    let currentVote = null;

    // --------------------
    // Cargar votos últimas 24h
    // --------------------
    async function loadCounts() {

      const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

      const { data } = await supabase
        .from("mood_votes")
        .select("mood")
        .gte("created_at", since);

      const grouped = {
        sad: 0,
        neutral: 0,
        hopeful: 0,
        calm: 0,
        angry: 0
      };

      data?.forEach(v => {
        grouped[v.mood]++;
      });

      const formatted = Object.keys(grouped).map(key => ({
        mood: key,
        count: grouped[key]
      }));

      formatted.sort((a, b) => b.count - a.count);

      render(formatted);
    }

    // --------------------
    // Render bonito
    // --------------------
    function render(data) {

      const container = document.getElementById("counts");

      const total = data.reduce((sum, m) => sum + m.count, 0);

      const maxMood = data.reduce((prev, current) =>
        current.count > prev.count ? current : prev
        , data[0]);

      const emojiMap = {
        sad: "😞",
        neutral: "😐",
        hopeful: "🙂",
        calm: "😌",
        angry: "😠"
      };

      container.innerHTML = data.map(m => {

        const percentage = total ? (m.count / total) * 100 : 0;

        const dominantClass =
          m.mood === maxMood.mood && m.count > 0
            ? "dominant"
            : "";

        return `
      <div class="stat-card ${dominantClass}">
        <div class="stat-header">
          <span>${emojiMap[m.mood]} ${m.mood}</span>
          <span class="stat-count">${m.count}</span>
        </div>
        <div class="stat-bar">
          <div class="stat-bar-fill" style="width:${percentage}%"></div>
        </div>
      </div>
    `;
      }).join("");
    }

    // --------------------
    // Resaltar mood actual
    // --------------------
    function highlightSelected() {
      const vote = localStorage.getItem("mood_vote");
      document.querySelectorAll(".moods button").forEach(btn => {
        btn.classList.remove("active");
      });

      const selected = document.querySelector(
        `.moods button[onclick="vote('${vote}')"]`
      );
      if (selected) selected.classList.add("active");
    }

    // --------------------
    // Votar
    // --------------------
    window.vote = async function (mood) {
      const token = getUserToken();

      try {
        await supabase.rpc("vote_mood", {
          _mood: mood,
          _user_token: token
        });

        // Guardamos localmente para resaltar el botón
        localStorage.setItem("mood_vote", mood);

        // Actualizamos contadores y resaltado
        currentVote = mood;
        loadCounts();
        highlightSelected();

      } catch (err) {
        console.error("Error votando:", err);
      }
    };
    // --------------------
    // Realtime
    // --------------------
    supabase
      .channel('mood_changes')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'mood_votes' },
        () => loadCounts()
      )
      .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'mood_votes' },
        () => loadCounts()
      )
      .subscribe();

    // Init
    loadCounts();
    highlightCurrentMood();

  </script>
</body>

</html>
